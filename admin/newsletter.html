<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>

        Newsletter | FoodChain Admin

    </title>

    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/newsletter.css">

    <link rel="stylesheet" href="css/admin.css">

    <link rel="icon" href="assets/images/logo.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

    <div class="dashboard">

        <aside class="sidebar">

            <div class="logo">

                <img src="../assets/images/logo.png">

                <h2>FoodChain</h2>

            </div>

            <ul class="sidebar-menu">

                <a href="dashboard.html">
                    <li>
                        <i class="fas fa-chart-line"></i>
                        Dashboard
                    </li>
                </a>

                <a href="restaurants.html">
                    <li>
                        <i class="fas fa-store"></i>
                        Restaurants
                    </li>
                </a>

                <a href="partnerships.html">
                    <li>
                        <i class="fas fa-handshake"></i>
                        Partnership Requests
                    </li>
                </a>

                <a href="messages.html">
                    <li>
                        <i class="fas fa-envelope"></i>
                        Contact Messages
                    </li>
                </a>

                <a href="newsletter.html">
                    <li class="active">
                        <i class="fas fa-newspaper"></i>
                        Newsletter
                    </li>
                </a>

                <a href="blog.html">
                    <li>
                        <i class="fas fa-blog"></i>
                        Blog
                    </li>
                </a>

                <a href="settings.html">
                    <li>
                        <i class="fas fa-cog">

                        </i>
                        Settings
                    </li>
                </a>

            </ul>

        </aside>

        <main class="main-content">

            <header class="topbar">

                <div class="topbar-left">

                    <button class="menu-toggle" id="menuToggle">

                        <i class="fas fa-bars"></i>

                    </button>

                    <h1>Newsletter</h1>

                </div>

                <div class="topbar-right">

                    <div class="notification">

                        <i class="fas fa-bell" id="notificationBell"></i>

                        <span class="notification-count" id="notificationCount">0</span>

                        <div class="notification-dropdown" id="notificationDropdown">

                            <h3>Notifications</h3>

                            <div class="notification-actions">
                                <button id="markAllReadBtn">
                                    ✓ Mark All as Read
                                </button>
                            </div>


                            <div class="notification-actions">

                                <button id="showAllBtn">All</button>

                                <button id="showUnreadBtn">Unread</button>

                            </div>

                            <ul id="notificationList"></ul>

                            <ul id="notificationList">
                            </ul>

                            <button id="viewAllNotifications">

                                View All

                            </button>

                        </div>

                    </div>

                    <!-- <i class="fas fa-moon"></i> -->

                    <img src="../assets/images/logo.png" alt="Admin">

                </div>

            </header>

            <!-- Mobile Overlay -->
            <div class="sidebar-overlay" id="sidebarOverlay"></div>



            <section class="page-intro">

                <h2>

                    Subscribers

                </h2>

                <p>

                    Manage everyone who subscribed to FoodChain newsletters.

                </p>

            </section>

            <div class="search-container">

                <input type="text" id="searchSubscriber" placeholder="Search email...">

            </div>

            <section class="restaurant-list">

                <div class="list-header">

                    <h2>

                        All Subscribers

                    </h2>

                </div>

                <div class="table-container">

                    <table>

                        <thead>

                            <tr>

                                <th>Email</th>

                                <th>Date</th>

                                <th>Actions</th>

                            </tr>

                        </thead>

                        <tbody id="subscriberTableBody">

                        </tbody>

                    </table>

                </div>

            </section>

        </main>

    </div>
    <script src="js/newsletter.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/admin.js"></script>

</body>

</html>
